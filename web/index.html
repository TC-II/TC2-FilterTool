<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Relative paths so the icon works under Vite's /TC2-FilterTool/ base. -->
    <link rel="icon" href="./favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="./favicon-48x48.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FilterTool</title>
    <!-- MathJax 3 — must load before Plotly so Plotly detects it for LaTeX labels.
         Use tex-svg-full so glyphs (y, t, h, …) are bundled; the slim build’s
         dynamic font fetches fail under this app’s COEP and leave empty (). -->
    <script>
      MathJax = {
        tex: { inlineMath: [['$', '$']] },
        svg: { fontCache: 'global' },
        startup: { typeset: false },
      }
    </script>
    <script id="MathJax-script" async
      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg-full.js">
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>

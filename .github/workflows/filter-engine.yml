name: Filter engine

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test Rust engine and golden parity
        run: cargo test --manifest-path crates/filter-engine/Cargo.toml --tests

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web dependencies
        working-directory: web
        run: npm ci
      - name: Validate golden fixture corpus
        working-directory: web
        run: npm run fixtures:test
      - name: Build production web app
        working-directory: web
        run: npm run build
